<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Districts — KeralaPulse</title>
  <meta name="description" content="Explore all 14 districts of Kerala — population, area, literacy rate, headquarters, and taluks. Powered by KeralaPulse." />

  <script>
    (function(){ var t=localStorage.getItem('kp_theme')||'light'; document.documentElement.setAttribute('data-theme',t); })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- HEADER -->
<header class="kp-header" role="banner">
  <a href="index.html" class="brand" aria-label="KeralaPulse Home">
    <span class="pulse-mark" aria-hidden="true">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="13" stroke="#00C853" stroke-width="2"/>
        <polyline points="3,14 8,14 10,8 13,20 16,11 18,17 20,14 25,14"
                  stroke="#00C853" stroke-width="2" fill="none"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    Kerala<span class="brand-accent">Pulse</span>
  </a>

  <nav class="top-navbar" aria-label="Primary navigation">
    <a href="index.html"     id="topnav-home">Home</a>
    <a href="index.html#map" id="topnav-map">Map</a>
    <a href="news.html"      id="topnav-news">News</a>
    <a href="districts.html" id="topnav-districts" aria-current="page">Districts</a>
    <a href="settings.html"  id="topnav-settings">Settings</a>
  </nav>

  <div class="header-actions">
    <button class="btn-icon ripple-btn" id="search-btn" aria-label="Open search">
      <i class="bi bi-search" aria-hidden="true"></i>
    </button>
    <button class="btn-icon ripple-btn" id="theme-toggle" aria-label="Toggle theme">
      <i class="bi bi-sun-fill" id="theme-sun"  aria-hidden="true"></i>
      <i class="bi bi-moon-fill" id="theme-moon" aria-hidden="true" style="display:none"></i>
    </button>
  </div>
</header>

<!-- SEARCH MODAL -->
<div id="search-modal" class="search-modal" role="dialog" aria-modal="true" aria-label="Search">
  <div class="search-modal-inner">
    <form id="search-form" role="search" autocomplete="off">
      <div class="search-input-wrap">
        <i class="bi bi-search" aria-hidden="true"></i>
        <input type="search" id="search-input" placeholder="Search districts, topics…" aria-label="Search" />
        <button type="button" id="search-close" aria-label="Close search" style="color:var(--text-muted);padding:0 4px">
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
      </div>
    </form>
    <div id="search-recent"></div>
    <div id="search-results" style="display:none"></div>
  </div>
</div>

<!-- DISTRICT MODAL -->
<div class="modal fade district-modal" id="district-modal" tabindex="-1" aria-labelledby="dm-name" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h5 class="modal-title mb-0" id="dm-name">District</h5>
          <div class="mt-1" style="font-size:.78rem;color:var(--text-muted)">
            <i class="bi bi-building me-1"></i>HQ: <span id="dm-hq"></span>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 mb-3">
          <div class="col-6">
            <div class="district-stat-card">
              <div class="stat-label"><i class="bi bi-people me-1"></i>Population</div>
              <div class="stat-value" id="dm-population">—</div>
            </div>
          </div>
          <div class="col-6">
            <div class="district-stat-card">
              <div class="stat-label"><i class="bi bi-map me-1"></i>Area</div>
              <div class="stat-value" id="dm-area">—</div>
            </div>
          </div>
        </div>
        <div class="district-stat-card mb-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="stat-label"><i class="bi bi-book me-1"></i>Literacy Rate</div>
            <span class="stat-value" id="dm-literacy-val">—</span>
          </div>
          <div class="progress">
            <div id="dm-literacy-bar" class="progress-bar" role="progressbar" style="width:0%" aria-label="Literacy rate"></div>
          </div>
        </div>
        <div class="district-stat-card">
          <div class="stat-label mb-2"><i class="bi bi-grid me-1"></i>Taluks</div>
          <div id="dm-taluks" class="d-flex flex-wrap gap-1"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<main role="main">
<div class="page-container">

  <!-- Page header -->
  <div class="mb-3 fade-in-up">
    <h1 style="font-size:1.6rem;font-weight:800;">Kerala Districts</h1>
    <p style="color:var(--text-secondary);font-size:.875rem;margin-top:.25rem">
      All 14 districts · North to South · Click any card for details
    </p>
  </div>

  <!-- State summary strip -->
  <div class="kp-card mb-4 fade-in-up" style="animation-delay:.1s">
    <div class="row g-3 text-center">
      <div class="col-6 col-md-3">
        <div style="font-size:.68rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Districts</div>
        <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent)">14</div>
      </div>
      <div class="col-6 col-md-3">
        <div style="font-size:.68rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Population</div>
        <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text-primary)">3.34 Cr</div>
      </div>
      <div class="col-6 col-md-3">
        <div style="font-size:.68rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Total Area</div>
        <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text-primary)">38,852 km²</div>
      </div>
      <div class="col-6 col-md-3">
        <div style="font-size:.68rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Avg. Literacy</div>
        <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent)">94.0%</div>
      </div>
    </div>
  </div>

  <!-- Districts grid -->
  <div class="row g-3 stagger-children" id="districts-grid" aria-label="Kerala districts">
    <!-- Cards are generated by JS below -->
  </div>

</div><!-- /page-container -->
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="Mobile navigation">
  <a href="index.html"     class="nav-item" id="nav-home"      aria-label="Home"><i class="bi bi-house-fill" aria-hidden="true"></i><span>Home</span></a>
  <a href="index.html#map" class="nav-item" id="nav-map"       aria-label="Map"><i class="bi bi-map-fill" aria-hidden="true"></i><span>Map</span></a>
  <a href="news.html"      class="nav-item" id="nav-news"      aria-label="News"><i class="bi bi-newspaper" aria-hidden="true"></i><span>News</span></a>
  <a href="districts.html" class="nav-item" id="nav-districts" aria-label="Districts" aria-current="page"><i class="bi bi-grid-fill" aria-hidden="true"></i><span>Districts</span></a>
  <a href="settings.html"  class="nav-item" id="nav-settings"  aria-label="Settings"><i class="bi bi-gear-fill" aria-hidden="true"></i><span>Settings</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('districts-grid');
  if (!grid || !window.KP) return;

  window.KP.DISTRICTS.forEach((d, i) => {
    const literacyNum = parseFloat(d.literacy);
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-lg-4';
    col.innerHTML = `
      <div class="district-card ripple-btn" id="dc-${d.id}"
           role="button" tabindex="0" aria-label="View details for ${d.name}"
           onclick="window.KP.openDistrictModal('${d.id}')"
           onkeydown="if(event.key==='Enter'||event.key===' ')window.KP.openDistrictModal('${d.id}')">
        <div class="d-flex align-items-start justify-content-between mb-2">
          <div>
            <div class="district-name">${d.name}</div>
            <div class="district-hq"><i class="bi bi-building" aria-hidden="true"></i>${d.hq}</div>
          </div>
          <div style="
            width:36px;height:36px;border-radius:10px;
            background:${d.color}22;
            display:flex;align-items:center;justify-content:center;
            font-size:1.1rem;color:${d.color};flex-shrink:0;" aria-hidden="true">
            <i class="bi bi-geo-alt-fill"></i>
          </div>
        </div>

        <div class="stat-row">
          <span class="stat-badge"><i class="bi bi-people" aria-hidden="true"></i> ${d.population}</span>
          <span class="stat-badge"><i class="bi bi-map" aria-hidden="true"></i> ${d.area}</span>
        </div>

        <div class="mb-1 d-flex justify-content-between align-items-center">
          <span style="font-size:.72rem;color:var(--text-muted);font-weight:600;">Literacy</span>
          <span style="font-size:.72rem;font-weight:700;color:var(--accent)">${d.literacy}</span>
        </div>
        <div class="progress mb-2" style="height:6px;" aria-label="Literacy rate ${d.literacy}">
          <div class="progress-bar" style="width:${literacyNum}%;background:${d.color}" role="progressbar"></div>
        </div>

        <div style="font-size:.7rem;color:var(--text-muted);">
          <i class="bi bi-grid-3x3" aria-hidden="true"></i>
          ${d.taluks.length} Taluks
          <span class="ms-2" style="color:var(--accent);font-weight:600;">View →</span>
        </div>
      </div>`;
    grid.appendChild(col);

    // Stagger animation
    col.querySelector('.district-card').style.animationDelay = (0.04 * i) + 's';
  });
});
</script>

</body>
</html>
